<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminé !</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('index') }}">🎬 Films à venir</a>
    <a href="{{ url_for('recommendations') }}">⭐ Recommandations</a>
  </nav>

  <div class="container done">
    <h1>🎬 Vous avez tout vu !</h1>
    <p>Sur {{ total }} film(s) à venir :</p>
    <div class="stats">
      <div class="stat">👍 <strong>{{ likes }}</strong> aimé(s)</div>
      <div class="stat">👎 <strong>{{ dislikes }}</strong> non aimé(s)</div>
    </div>
    <a href="{{ url_for('reset') }}" class="btn btn-skip">Recommencer depuis le début</a>
  </div>
</body>
</html>
